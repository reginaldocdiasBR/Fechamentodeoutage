<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fechamento de Outage</title>
<style>

    :root {
        --claro-vermelho: #DA291C;
        --claro-cinza: #A7A8AA;
        --claro-preto: #2D291C;
        --claro-vermelho-escuro: #AF272F;
        --claro-turquesa: #0097A9;
        --claro-laranja: #F5842B;
        --branco: #FFFFFF;
        --cinza-suave: #F7F7F7;
        --borda: rgba(45, 41, 28, 0.18);
        --sombra: 0 16px 38px rgba(45, 41, 28, 0.16);
    }
    * { box-sizing: border-box; }
    html { min-height: 100%; }
    body {
        margin: 0;
        min-height: 100vh;
        font-family: Arial, Helvetica, sans-serif;
        color: var(--claro-preto);
        background: var(--branco);
        overflow-x: hidden;
        position: relative;
    }
    /* Plano de fundo inspirado na imagem enviada: topo vermelho com onda branca,
       logo Claro estilizada e elementos geométricos suaves na área inferior. */
    
    

    /* Topo conforme imagem enviada: faixa vermelha, curva branca inferior e logo Claro circular real. */
    .topo-claro {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 124px;
        z-index: 1;
        pointer-events: none;
        overflow: hidden;
        background: transparent;
    }
    .topo-claro-svg {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 124px;
        display: block;
    }
    .topo-claro-logo-img {
        position: absolute;
        top: 26px;
        left: 47px;
        width: 74px;
        height: 74px;
        object-fit: contain;
        border-radius: 50%;
        filter: drop-shadow(0 2px 4px rgba(0,0,0,0.26));
        user-select: none;
        -webkit-user-drag: none;
    }
    .layout-principal {
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(430px, 560px);
        gap: 22px;
        align-items: start;
    }
    .painel-lateral-imagem {
        order: 2;
        background: rgba(255,255,255,0.96);
        border: 1px solid rgba(167,168,170,0.45);
        border-radius: 18px;
        box-shadow: var(--sombra);
        padding: 14px;
        position: sticky;
        top: 136px;
        overflow: hidden;
    }
    .painel-lateral-imagem img {
        display: block;
        width: 100%;
        min-width: 0;
        height: auto;
        border-radius: 10px;
        border: 1px solid rgba(45,41,28,0.18);
        background: #fff;
    }

    .bg-detalhes {
        position: fixed;
        inset: 0;
        z-index: -1;
        pointer-events: none;
        overflow: hidden;
    }
    .bg-detalhes::before {
        content: "";
        position: absolute;
        left: 6%;
        bottom: 4%;
        width: 72px;
        height: 230px;
        border: 3px solid rgba(175,39,47,0.12);
        transform: rotate(0deg);
        border-radius: 2px;
    }
    .bg-detalhes::after {
        content: "";
        position: absolute;
        left: 31%;
        bottom: -2%;
        width: 82px;
        height: 310px;
        border: 3px solid rgba(175,39,47,0.12);
        transform: rotate(45deg);
        border-radius: 2px;
    }
    
    .container {
        position: relative;
        z-index: 2;
        max-width: 1760px;
        margin: 0 auto;
        padding: 132px 18px 26px;
    }
    .card-principal {
        order: 1;
        margin-top: 0;
        padding: 24px 26px 18px;
        background: rgba(255,255,255,0.94);
        border: 1px solid rgba(167,168,170,0.45);
        border-radius: 22px;
        box-shadow: var(--sombra);
        backdrop-filter: blur(4px);
        width: 100%;
        min-width: 0;
    }
    h1 {
        text-align: center;
        font-size: 26px;
        margin: 0 0 22px;
        font-weight: 900;
        color: var(--claro-preto);
        letter-spacing: .3px;
        text-transform: uppercase;
    }
    h1::after {
        content: "";
        display: block;
        width: 160px;
        height: 4px;
        margin: 10px auto 0;
        border-radius: 99px;
        background: linear-gradient(90deg, var(--claro-vermelho), var(--claro-laranja), var(--claro-turquesa));
    }
    .form-grid {
        display: grid;
        grid-template-columns: 200px minmax(260px, 1fr);
        gap: 10px 12px;
        align-items: center;
    }
    label {
        text-align: right;
        font-weight: 800;
        font-size: 14px;
        color: var(--claro-preto);
    }
    input, select {
        width: 100%;
        max-width: 780px;
        height: 38px;
        padding: 7px 11px;
        border: 1px solid var(--borda);
        border-left: 5px solid var(--claro-vermelho);
        border-radius: 9px;
        font-size: 14px;
        background: #ffffff;
        color: var(--claro-preto);
        outline: none;
        transition: border-color .18s ease, box-shadow .18s ease, transform .18s ease;
    }
    input:hover, select:hover, textarea:hover { border-color: rgba(218,41,28,0.45); }
    input:focus, select:focus, textarea:focus {
        border-color: var(--claro-turquesa);
        box-shadow: 0 0 0 4px rgba(0,151,169,0.18);
        transform: translateY(-1px);
    }
    select {
        accent-color: var(--claro-vermelho);
    }
    .info-fixos {
        display: none !important;
        visibility: hidden !important;
        height: 0 !important;
        min-height: 0 !important;
        overflow: hidden !important;
        margin: 0 !important;
        padding: 0 !important;
        border: 0 !important;
        text-align: center;
        font-size: 12px;
        color: var(--claro-preto);
        margin: 14px auto 8px;
        font-weight: 800;
        background: rgba(167,168,170,0.16);
        border: 1px solid rgba(167,168,170,0.35);
        border-radius: 12px;
        padding: 9px 12px;
        max-width: 1020px;
    }
    .botoes {
        display: flex;
        justify-content: center;
        gap: 10px;
        margin-top: 18px;
        flex-wrap: wrap;
    }
    button {
        border: none;
        color: white;
        padding: 11px 22px;
        font-weight: 900;
        font-size: 14px;
        cursor: pointer;
        min-width: 190px;
        border-radius: 10px !important;
        box-shadow: 0 8px 16px rgba(45,41,28,0.16);
        transition: transform .16s ease, filter .16s ease, box-shadow .16s ease;
        letter-spacing: .2px;
    }
    button:hover { transform: translateY(-2px); filter: brightness(0.96); box-shadow: 0 12px 22px rgba(45,41,28,0.20); }
    button:active { transform: translateY(0); }
    .gerar { background: linear-gradient(135deg, var(--claro-vermelho), var(--claro-vermelho-escuro)); }
    .gerar:hover { background: linear-gradient(135deg, #E5392D, var(--claro-vermelho-escuro)); }
    .limpar { background: linear-gradient(135deg, var(--claro-laranja), #D96512); }
    .limpar:hover { background: linear-gradient(135deg, #FF9340, #D96512); }
    .copiar { background: linear-gradient(135deg, var(--claro-turquesa), #087C8A); }
    .copiar:hover { background: linear-gradient(135deg, #00AFC3, #087C8A); }
    .planilha { background: linear-gradient(135deg, #2F80C1, #1F5F94); }
    .planilha:hover { background: linear-gradient(135deg, #3A8FD4, #1F5F94); }
    .mensagem {
        max-width: 780px;
        margin: 13px auto 0;
        text-align: center;
        padding: 11px 14px;
        border-radius: 10px;
        font-weight: 900;
        display: none;
        border: 1px solid transparent;
    }
    .msg-ok { display:block; background: rgba(0,151,169,0.13); color: #006B78; border-color: rgba(0,151,169,0.28); }
    .msg-erro { display:block; background: rgba(245,132,43,0.15); color: #8A4200; border-color: rgba(245,132,43,0.34); }
    textarea {
        display: block;
        width: 92%;
        max-width: 980px;
        height: 320px;
        margin: 16px auto 0;
        background: linear-gradient(135deg, var(--claro-preto), #403A2A);
        color: #ffffff;
        font-size: 16px;
        font-weight: 800;
        font-family: Consolas, "Courier New", monospace;
        padding: 16px;
        border-radius: 14px;
        border: 2px solid rgba(218,41,28,0.22);
        resize: vertical;
        white-space: pre;
        box-shadow: inset 0 0 0 1px rgba(255,255,255,0.07), 0 12px 22px rgba(45,41,28,0.13);
    }
    footer {
        color: var(--claro-preto);
        text-align: center;
        font-style: italic;
        margin-top: 16px;
        font-size: 13px;
        font-weight: 700;
    }
    @media (max-width: 1220px) {
        
    }
    @media (max-width: 760px) {
        
        
        .card-principal { margin-top: 92px; padding: 18px 14px; border-radius: 18px; }
        .form-grid { grid-template-columns: 1fr; gap: 6px; }
        label { text-align: left; margin-top: 6px; }
        input, select { max-width: 100%; height: 38px; }
        button { width: 100%; min-width: 0; margin-bottom: 0; }
        textarea { width: 100%; font-size: 13px; height: 280px; }
        h1 { font-size: 21px; }
    }


    @media (max-width: 1150px) {
        .layout-principal {
            grid-template-columns: 1fr;
        }
        .painel-lateral-imagem {
            order: 2;
            position: relative;
            top: auto;
            max-width: 760px;
            width: 100%;
            margin: 0 auto;
        }
        .card-principal { order: 1; }
    }
    @media (max-width: 760px) {
        .topo-claro { height: 104px; }
        .topo-claro-svg { height: 104px; }
        .topo-claro-logo-img {
            top: 21px;
            left: 31px;
            width: 61px;
            height: 61px;
        }
        .container { padding-top: 112px; }
        .card-principal { margin-top: 0; }
    }

</style>
</head>

function preencherSelect(id, lista, placeholder = "Selecione") {
    const select = document.getElementById(id);
    select.innerHTML = "";
    if (placeholder !== null) {
        const opt = document.createElement("option");
        opt.value = "";
        opt.textContent = placeholder;
        select.appendChild(opt);
    }
    lista.forEach(item => {
        const opt = document.createElement("option");
        opt.value = item;
        opt.textContent = item;
        select.appendChild(opt);
    });
}

function pad(n) { return String(n).padStart(2, "0"); }

function agoraBR() {
    const d = new Date();
    return `${pad(d.getDate())}/${pad(d.getMonth() + 1)}/${d.getFullYear()} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
}

function formatarTempo(valor) {
    const n = valor.replace(/\D/g, "").slice(0, 4);
    if (n.length <= 2) return n;
    return n.slice(0, 2) + ":" + n.slice(2);
}

function formatarDataHora(valor) {
    const n = valor.replace(/\D/g, "").slice(0, 12);
    if (n.length <= 2) return n;
    if (n.length <= 4) return n.slice(0, 2) + "/" + n.slice(2);
    if (n.length <= 8) return n.slice(0, 2) + "/" + n.slice(2, 4) + "/" + n.slice(4);
    if (n.length <= 10) return n.slice(0, 2) + "/" + n.slice(2, 4) + "/" + n.slice(4, 8) + " " + n.slice(8);
    return n.slice(0, 2) + "/" + n.slice(2, 4) + "/" + n.slice(4, 8) + " " + n.slice(8, 10) + ":" + n.slice(10);
}

function mostrarMensagem(texto, tipo = "ok") {
    const msg = document.getElementById("mensagem");
    msg.textContent = texto;
    msg.className = "mensagem " + (tipo === "erro" ? "msg-erro" : "msg-ok");
}

function atualizarSolucoes() {
    const fechamento = document.getElementById("fechamento").value;
    const solucao = document.getElementById("solucao");
    const opcoes = SOLUCOES_POR_FECHAMENTO[fechamento] || [];

    solucao.innerHTML = "";

    if (opcoes.length === 0) {
        const opt = document.createElement("option");
        opt.value = "AUTOMÁTICO";
        opt.textContent = "AUTOMÁTICO";
        solucao.appendChild(opt);
        solucao.value = "AUTOMÁTICO";
        solucao.disabled = true;
    } else {
        solucao.disabled = false;
        const vazio = document.createElement("option");
        vazio.value = "";
        vazio.textContent = "Selecione";
        solucao.appendChild(vazio);
        opcoes.forEach(item => {
            const opt = document.createElement("option");
            opt.value = item;
            opt.textContent = item;
            solucao.appendChild(opt);
        });
        if (opcoes.length === 1) solucao.value = opcoes[0];
    }

    const infoSolucao = opcoes.length ? `SOLUÇÃO: Selecionável (${opcoes.length} opções)` : `SOLUÇÃO: Automática (${INFO_FIXA["Solução"]})`;
    document.getElementById("infoFixos").textContent = `CAMPOS AUTOMÁTICOS: Parte da Falha (${INFO_FIXA["Parte da Falha"]}) | Natureza (${INFO_FIXA.Natureza}) | Impacto (${INFO_FIXA.Impacto}) | Fato (${INFO_FIXA.Fato}) | Causa (${INFO_FIXA.Causa}) | Ação (${INFO_FIXA["Ação"]}) | ${infoSolucao}`;
}

function valor(id) { return document.getElementById(id).value.trim(); }

function gerarFechamento() {
    const dados = {
        ticket: valor("ticket"),
        h_ini: valor("h_ini"),
        h_fim: valor("h_fim"),
        tempo: valor("tempo"),
        sintoma: valor("sintoma"),
        abrangencia: valor("abrangencia"),
        fechamento: valor("fechamento"),
        parte_falha: valor("parte_falha"),
        natureza: valor("natureza"),
        impacto: valor("impacto"),
        fato: valor("fato"),
        causa: valor("causa"),
        acao: valor("acao"),
        solucao: valor("solucao")
    };

    const obrigatorios = [
        ["Nº TICKET", dados.ticket, "ticket"],
        ["Horário Inicial", dados.h_ini, "h_ini"],
        ["Horário Final", dados.h_fim, "h_fim"],
        ["Tempo Impacto", dados.tempo, "tempo"],
        ["Sintoma", dados.sintoma, "sintoma"],
        ["Abrangência", dados.abrangencia, "abrangencia"],
        ["Fechamento", dados.fechamento, "fechamento"],
        ["Parte da Falha", dados.parte_falha, "parte_falha"],
        ["Natureza", dados.natureza, "natureza"],
        ["Impacto", dados.impacto, "impacto"],
        ["Fato", dados.fato, "fato"],
        ["Causa", dados.causa, "causa"],
        ["Ação", dados.acao, "acao"],
        ["Solução", dados.solucao, "solucao"]
    ];

    for (const [nome, conteudo, id] of obrigatorios) {
        if (!conteudo) {
            mostrarMensagem("Preencha o campo obrigatório: " + nome, "erro");
            document.getElementById(id).focus();
            return;
        }
    }

    const regexData = /^\d{2}\/\d{2}\/\d{4} \d{2}:\d{2}$/;
    const regexTempo = /^\d{2}:\d{2}$/;

    if (!regexData.test(dados.h_ini)) {
        mostrarMensagem("Horário Inicial deve estar no formato dd/mm/aaaa hh:mm", "erro");
        document.getElementById("h_ini").focus();
        return;
    }
    if (!regexData.test(dados.h_fim)) {
        mostrarMensagem("Horário Final deve estar no formato dd/mm/aaaa hh:mm", "erro");
        document.getElementById("h_fim").focus();
        return;
    }
    if (!regexTempo.test(dados.tempo)) {
        mostrarMensagem("Tempo Impacto deve estar no formato hh:mm", "erro");
        document.getElementById("tempo").focus();
        return;
    }

    const [hh, mm] = dados.tempo.split(":").map(Number);
    if (mm > 59) {
        mostrarMensagem("Minutos devem estar entre 00 e 59", "erro");
        document.getElementById("tempo").focus();
        return;
    }

    const opcoes = SOLUCOES_POR_FECHAMENTO[dados.fechamento] || [];
    const solucaoFinal = opcoes.length ? dados.solucao : INFO_FIXA["Solução"];

    const linhas = [
        ["TICKET", dados.ticket],
        ["HORARIO INICIAL", dados.h_ini],
        ["HORARIO FINAL", dados.h_fim],
        ["TEMPO IMPACTO", dados.tempo],
        ["SINTOMA", dados.sintoma],
        ["ABRANGENCIA", dados.abrangencia],
        ["FECHAMENTO", dados.fechamento],
        ["PARTE DA FALHA", dados.parte_falha],
        ["NATUREZA", dados.natureza],
        ["IMPACTO", dados.impacto],
        ["FATO", dados.fato],
        ["CAUSA", dados.causa],
        ["AÇÃO", dados.acao],
        ["SOLUÇÃO", solucaoFinal]
    ];

    let texto = "______________________FECHAMENTO COP__________________\n";
    linhas.forEach(([chave, conteudo]) => {
        texto += chave.padEnd(15, " ") + " : " + conteudo + "\n";
    });
    texto += "________________________________________________________";

    document.getElementById("resultado").value = texto;
    mostrarMensagem("GERADO FECHAMENTO DE OUTAGE " + dados.ticket, "ok");
}

function limparTodos() {
    ["ticket", "h_ini", "h_fim", "tempo", "abrangencia", "fato", "causa", "acao", "resultado"].forEach(id => {
        document.getElementById(id).value = "";
    });

    document.getElementById("h_ini").value = agoraBR();
    document.getElementById("fechamento").value = "DATACENTER";
    document.getElementById("sintoma").value = "";
    document.getElementById("parte_falha").value = "";
    document.getElementById("natureza").value = "";
    document.getElementById("impacto").value = "";
    atualizarSolucoes();
    mostrarMensagem("Dados limpados com sucesso!", "ok");
}

async function copiarResultado() {
    const resultado = document.getElementById("resultado").value;
    if (!resultado.trim()) {
        mostrarMensagem("Não há resultado para copiar.", "erro");
        return;
    }

    try {
        await navigator.clipboard.writeText(resultado);
        mostrarMensagem("Resultado copiado para a área de transferência!", "ok");
    } catch (e) {
        const area = document.getElementById("resultado");
        area.select();
        document.execCommand("copy");
        mostrarMensagem("Resultado copiado com sucesso!", "ok");
    }
}


function escapeHtmlExcel(valor) {
    return String(valor ?? "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
}
function nomeArquivoSeguro(valor) {
    return String(valor || "SEM_TICKET").replace(/[^a-zA-Z0-9_-]/g, "_");
}
function dataHoraArquivo() {
    const d = new Date();
    return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}_${pad(d.getHours())}-${pad(d.getMinutes())}`;
}
function gerarPlanilha() {
    gerarFechamento();
    const resultado = document.getElementById("resultado").value.trim();
    if (!resultado) {
        mostrarMensagem("Gere o fechamento antes de exportar a planilha.", "erro");
        return;
    }
    const fechamentoSelecionado = valor("fechamento");
    const opcoes = SOLUCOES_POR_FECHAMENTO[fechamentoSelecionado] || [];
    const solucaoFinal = opcoes.length ? valor("solucao") : INFO_FIXA["Solução"];
    const linhas = [
        ["TICKET", valor("ticket")],
        ["HORARIO INICIAL", valor("h_ini")],
        ["HORARIO FINAL", valor("h_fim")],
        ["TEMPO IMPACTO", valor("tempo")],
        ["SINTOMA", valor("sintoma")],
        ["ABRANGENCIA", valor("abrangencia")],
        ["FECHAMENTO", fechamentoSelecionado],
        ["PARTE DA FALHA", valor("parte_falha")],
        ["NATUREZA", valor("natureza")],
        ["IMPACTO", valor("impacto")],
        ["FATO", valor("fato")],
        ["CAUSA", valor("causa")],
        ["AÇÃO", valor("acao")],
        ["SOLUÇÃO", solucaoFinal]
    ];
    const linhasTabela = linhas.map(([campo, conteudo]) => `<tr><td class="campo">${escapeHtmlExcel(campo)}</td><td class="valor">${escapeHtmlExcel(conteudo)}</td></tr>`).join("");
    const htmlExcel = `<!DOCTYPE html><html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:x="urn:schemas-microsoft-com:office:excel" xmlns="http://www.w3.org/TR/REC-html40"><head><meta charset="UTF-8"><style>body{font-family:Arial,Helvetica,sans-serif;}table{border-collapse:collapse;table-layout:fixed;width:640px;}col.c1{width:170px;}col.c2{width:470px;}td{border:1px solid #000;height:26px;padding:5px 7px;font-size:11pt;vertical-align:middle;mso-number-format:"\\@";}.titulo{background:#2F80C1;color:#FFF;font-weight:700;text-align:center;height:28px;font-size:12pt;}.campo{background:#9DC3E6;color:#1F1F1F;font-weight:700;}.valor{background:#BDD7EE;color:#1F1F1F;font-weight:400;}</style></head><body><table><colgroup><col class="c1"><col class="c2"></colgroup><tr><td class="titulo" colspan="2">FECHAMENTO COP</td></tr>${linhasTabela}</table></body></html>`;
    const blob = new Blob(["\ufeff", htmlExcel], { type: "application/vnd.ms-excel;charset=utf-8;" });
    const url = URL.createObjectURL(blob);
    const link = document.createElement("a");
    link.href = url;
    link.download = `Fechamento_Outage_${nomeArquivoSeguro(valor("ticket"))}_${dataHoraArquivo()}.xls`;
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
    URL.revokeObjectURL(url);
    mostrarMensagem("Planilha Excel gerada com sucesso no padrão de cores solicitado!", "ok");
}

function inicializar() {
    preencherSelect("sintoma", SINTOMAS);
    preencherSelect("fechamento", FECHAMENTOS, null);
    preencherSelect("parte_falha", PARTE_DA_FALHA);
    preencherSelect("natureza", NATUREZA);
    preencherSelect("impacto", IMPACTO);

    document.getElementById("fechamento").value = "DATACENTER";
    document.getElementById("h_ini").value = agoraBR();

    document.getElementById("fechamento").addEventListener("change", atualizarSolucoes);
    document.getElementById("tempo").addEventListener("input", function () { this.value = formatarTempo(this.value); });
    document.getElementById("h_ini").addEventListener("input", function () { this.value = formatarDataHora(this.value); });
    document.getElementById("h_fim").addEventListener("input", function () { this.value = formatarDataHora(this.value); });

    atualizarSolucoes();
}

inicializar();
